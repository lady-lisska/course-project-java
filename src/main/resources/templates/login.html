<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            color: #212529;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid #dee2e6;
        }
        .btn-yellow {
            background-color: #FFD700;
            color: #000;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0.5rem auto 1rem auto;
            transition: transform 0.2s;
        }
        .btn-yellow:hover {
            background-color: #FFC107;
            transform: scale(1.05);
        }
        .help-link {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .help-link:hover {
            color: #343a40;
            text-decoration: underline;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-text">ВХОД</div>

    <form id="loginForm">
        <input type="email" class="form-control" id="email" placeholder="Электронная почта" required>
        <input type="password" class="form-control" id="password" placeholder="Пароль" required>

        <div id="errorMsg" class="error-message">Неверный логин или пароль</div>

        <button type="submit" class="btn-yellow">
            &#10140;
        </button>
    </form>

    <a href="/support" class="help-link">Проблемы со входом?</a>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Блокируем перезагрузку

        const emailInput = document.getElementById('email').value;
        const passwordInput = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');

        errorDiv.style.display = 'none';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: emailInput,
                    email: emailInput,
                    password: passwordInput
                })
            });

            if (response.ok) {
                // Читаем ответ как чистый текст (библиотека jjwt отдает строку)
                const responseText = await response.text();

                let token = responseText;

                // Умная проверка: если это всё же JSON-объект, вытащим поле token
                try {
                    const jsonData = JSON.parse(responseText);
                    if (jsonData && jsonData.token) {
                        token = jsonData.token;
                    }
                } catch (jsonError) {
                    // Если упало в ошибку — значит в responseText лежал чистый токен строка, это наш случай!
                }

                // Клеим токен в память браузера
                localStorage.setItem('jwt_token', token);

                // Летим на дашборд
                window.location.href = '/dashboard';
            } else {
                errorDiv.textContent = 'Неверный логин или пароль';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('Ошибка:', error);
            errorDiv.textContent = 'Сервер недоступен';
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
